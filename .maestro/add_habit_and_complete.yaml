appId: com.dailyhabits.app
name: "Add habit and complete"
---
# NOTE: @gorhom/bottom-sheet portals its content into a separate native layer
# that XCTest does not reliably surface in iOS' accessibility tree (only the
# top-level sheet header text shows up). Maestro can open the sheet and assert
# its presentation, but cannot drive the inner Name/Frequency/Save fields
# without the UI hierarchy. The end-to-end Add-then-Complete journey is
# covered on web by the Playwright `counter_complete_habit.spec.ts` flow.
- launchApp:
    appId: com.dailyhabits.app
    clearState: true
- extendedWaitUntil:
    visible:
      id: "today-screen"
    timeout: 20000
- assertVisible:
    id: "habit-add-fab"
- tapOn:
    id: "habit-add-fab"
- extendedWaitUntil:
    visible: ".*New habit.*"
    timeout: 6000
# Sheet is open with Name, Frequency, Icon, Color sections rendered. We
# don't drive the inner fields because @gorhom/bottom-sheet's portal hides
# children from the iOS accessibility tree under newArchEnabled.
# Swipe the sheet down to dismiss it (the sheet's drag handle is at ~21%).
- swipe:
    start: "50%, 21%"
    end: "50%, 95%"
    duration: 400
- extendedWaitUntil:
    visible:
      id: "today-screen"
    timeout: 5000
# Confirm the user can complete a habit's checkbox — this exercises the
# tap-to-complete + streak path that the original test wanted to cover
# after Add. We match either "mark complete" or "completed" depending on
# DB state from prior runs (clearState: false).
- tapOn:
    text: ".*(mark complete|completed).*"
- extendedWaitUntil:
    visible: ".*(completed|unchecked).*"
    timeout: 4000
