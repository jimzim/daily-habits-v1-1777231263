appId: com.dailyhabits.app
name: "Navigate to habit detail"
---
- launchApp:
    appId: com.dailyhabits.app
    clearState: true
- extendedWaitUntil:
    visible:
      id: "today-screen"
    timeout: 20000
- assertVisible: ".*Drink water.*"
- tapOn:
    text: ".*Open Drink water detail.*"
- extendedWaitUntil:
    visible:
      id: "habit-detail"
    timeout: 8000
- assertVisible:
    id: "habit-stats"
- assertVisible:
    id: "habit-calendar"
# Tap the back chevron in the navigation header (top-left circle).
- tapOn:
    point: "9%, 9%"
- extendedWaitUntil:
    visible:
      id: "today-screen"
    timeout: 5000
