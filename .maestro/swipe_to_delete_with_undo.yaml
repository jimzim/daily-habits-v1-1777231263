appId: com.dailyhabits.app
name: "Swipe to delete with undo"
---
- launchApp:
    appId: com.dailyhabits.app
    clearState: true
- extendedWaitUntil:
    visible:
      id: "today-screen"
    timeout: 20000
- assertVisible: ".*Drink water.*"
# react-native-gesture-handler's pan recognizer ignores Maestro's
# `from: text:` swipe, so use explicit coordinates that match the
# first habit row's vertical band.
- swipe:
    start: "85%, 22%"
    end: "8%, 22%"
    duration: 700
- assertVisible: ".*Delete.*"
- tapOn:
    text: ".*Delete Drink water.*"
- extendedWaitUntil:
    visible:
      id: "confirm-delete-habit-confirm"
    timeout: 5000
- tapOn:
    id: "confirm-delete-habit-confirm"
- assertVisible: "Habit deleted"
- assertVisible:
    id: "toast-undo-action"
- tapOn:
    id: "toast-undo-action"
- assertVisible: ".*Drink water.*"
